<!DOCTYPE html>
<html lang="en">

    <title>Profile Screen</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Boost Mobile Profile</h1>

    <footer>

    </footer>

</html>
